# Enable animations
animations=1
layer_animations=1

# Animation types
animation_type_open=slide
animation_type_close=slide

# Fade settings
animation_fade_in=1
animation_fade_out=0
tag_animation_direction=1

# Zoom settings
zoom_initial_ratio=0.4
zoom_end_ratio=0.8

# Fade opacity ranges
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8

# --- REDUCED DURATIONS (snappier) ---
animation_duration_move=200      # was 500
animation_duration_open=150      # was 400
animation_duration_tag=150       # was 350
animation_duration_close=250     # was 800
animation_duration_focus=0       # unchanged (instant)

# Animation curves (unchanged - these are already good)
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1